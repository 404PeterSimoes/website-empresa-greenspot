<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contactos - Greenspot</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <a href="/"><img src="../assets/imagens/Icone_GreenSpot_Sombra.png" alt="Logo Greenspot"></a>
    <h1>GreenSpot Lda.</h1>
    <nav>
    <a href="/">Início</a>
    <a href="/sobre/">Sobre</a>
    <a href="/contactos/">Contactos</a>
      <button id="dark-mode-toggle" aria-label="Alternar modo escuro">🌙</button>
    </nav>
  </header>

  <!-- FORMULÁRIO CONTACTOS -->
  <section id="contactos" class="contact-section">
    <h2>Contacta-nos</h2>
    <p>Entra em contacto connosco! Responderemos o mais rápido possível.</p>

    <form id="contact-form" class="modern-form">
      <div class="form-group">
        <input type="text" id="nome" name="nome" required>
        <label for="nome">Nome</label>
      </div>

      <div class="form-group">
        <input type="email" id="email" name="email" required>
        <label for="email">Email</label>
      </div>

      <div class="form-group">
        <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
        <label for="mensagem">Mensagem</label>
      </div>

      <button type="submit" class="btn-enviar">Enviar Mensagem</button>
    </form>

    <p id="form-feedback" style="display:none;"></p>
  </section>
<footer>
<img src="../assets/imagens/pessoas_cofinance1.png">
</footer>

  <script src="../script.js"></script>
</body>
</html>
