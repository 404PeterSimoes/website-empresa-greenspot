<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre - Greenspot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="assets/imagens/Icone_GreenSpot_Sombra.png" alt="Logo Greenspot">
    <h1>Sobre Nós</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contactos.html">Contactos</a>
      <button id="dark-mode-toggle">🌙</button>
    </nav>
  </header>

  <main>
    <section class="sobre">
      <h2>A Nossa Equipa</h2>
      <p>Conhece os 5 membros fundadores da PAP:</p>

      <div class="team-container">
        <div class="team-member">
          <img src="assets/imagens/membro1.png" alt="Membro 1" class="team-photo zoom-img">
          <h3>André Relvas</h3>
        </div>
        <div class="team-member">
          <img src="assets/imagens/membro2.png" alt="Membro 2" class="team-photo zoom-img">
          <h3>João Rosado</h3>
        </div>
        <div class="team-member">
          <img src="assets/imagens/membro3.png" alt="Membro 3" class="team-photo zoom-img">
          <h3>Pedro Simões</h3>
        </div>
        <div class="team-member">
          <img src="assets/imagens/membro4.png" alt="Membro 4" class="team-photo zoom-img">
          <h3>Rafael Azevedo</h3>
        </div>
        <div class="team-member">
          <img src="assets/imagens/membro5.png" alt="Membro 5" class="team-photo zoom-img">
          <h3>Tomás Santos</h3>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal para ampliar imagens -->
  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <footer>
    <p>&copy; 2025 - Greenspot Lda.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
